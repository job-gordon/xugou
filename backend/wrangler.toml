name = "xugou-backend"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "vm_monitor"
database_id = "c48c0132-79f2-474d-992a-4a0c19929ded"

[version_metadata]
binding = "CF_VERSION_METADATA"
